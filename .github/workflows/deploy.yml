name: Deploy to GitHub Pages

# Build and publish the Vite site to GitHub Pages whenever main updates
# (i.e. when a PR merges), plus a manual "Run workflow" button. The custom
# domain (public/CNAME -> dist/CNAME) is carried in the uploaded artifact, so
# xinyiklin.com keeps resolving.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: read the repo, write a Pages deployment, and mint the
# OIDC token deploy-pages uses to verify the deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time. Do NOT cancel an in-progress run — let a live deploy
# finish rather than leaving Pages half-published.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
