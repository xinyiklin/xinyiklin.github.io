<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Xinyi Lin">
  <!-- Brand monogram: teal -> violet gradient tile, matching the About app icon. -->
  <defs>
    <linearGradient id="xl-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#189a8c"/>
      <stop offset="0.5" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#7a5fc0"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#xl-grad)"/>

  <text
    x="50%"
    y="53%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Manrope, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="27"
    font-weight="800"
    letter-spacing="0.5"
    fill="#ffffff"
  >
    XL
  </text>
</svg>
